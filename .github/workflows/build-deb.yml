name: Build DEB

on:
  workflow_dispatch:

jobs:
  build:
    name: Build YTLiteJimbb DEB
    runs-on: macos-latest

    steps:
      - name: Install Dependencies
        run: brew install make ldid dpkg

      - name: Set PATH and THEOS env
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Cache Theos
        id: theos
        uses: actions/cache@v5
        env:
          cache-name: theos_cache_9bc7340
        with:
          path: theos/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Setup Theos
        if: steps.theos.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        if: steps.theos.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks

      - name: Checkout YTLiteJimbb
        uses: actions/checkout@v6
        with:
          path: YTLiteJimbb

      - name: Build YTLiteJimbb
        run: |
          cd YTLiteJimbb && make clean package DEBUG=0 FINALPACKAGE=1
          cp packages/*.deb ../YTLiteJimbb.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTLiteJimbb-deb
          path: YTLiteJimbb.deb
          retention-days: 7
